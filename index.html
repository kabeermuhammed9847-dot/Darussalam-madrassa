<!DOCTYPE html>
<html lang="ml">
<head><!-- PLAYABLE_TOUCH_PATCH_V1 --><script>
(function() {
  if (window.__playableTouchPatchInstalled) return;
  window.__playableTouchPatchInstalled = true;
  var origAdd = EventTarget.prototype.addEventListener;
  var blockedTypes = { touchstart: 1, touchmove: 1, wheel: 1 };
  EventTarget.prototype.addEventListener = function(type, listener, options) {
    if (blockedTypes[type]) {
      if (options === undefined || options === null) {
        options = { passive: true };
      } else if (typeof options === 'boolean') {
        options = { capture: options, passive: true };
      } else {
        options = Object.assign({}, options, { passive: true });
      }
    }
    return origAdd.call(this, type, listener, options);
  };
})();
</script><script>window.Intl=window.Intl||{};Intl.t=function(s){return(Intl._locale&&Intl._locale[s])||s;};</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ദാറുസ്സലാം മദ്റസ തെന്നല ആലുങ്ങൽ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Sans Malayalam',sans-serif}
body{background:#f4f6f4}
.header{background:#0a4d26;color:white;text-align:center;padding:18px 10px;position:sticky;top:0;z-index:10}
.header h1{font-size:24px;line-height:1.3;letter-spacing:0.3px}
.subbar{background:white;display:flex;gap:8px;padding:10px 12px;overflow:auto;border-bottom:1px solid #e0e0e0}
.btn{border:none;padding:8px 16px;border-radius:22px;font-weight:600;font-size:14px;cursor:pointer;white-space:nowrap}
.btn-g{background:#0a4d26;color:white}.btn-b{background:#1877f2;color:white}.btn-l{background:#eee}
.tabs{display:flex;gap:8px;padding:12px;background:#eaf2eb;overflow:auto}
.tab{padding:10px 18px;border-radius:22px;border:none;background:white;font-weight:600;cursor:pointer}
.tab.active{background:#0a4d26;color:white;box-shadow:0 4px 10px rgba(0,0,0,0.15)}
.card{background:linear-gradient(135deg,#0a5c2f,#1e9d5a);margin:14px;border-radius:22px;padding:20px;color:white}
.card h2{font-size:22px;line-height:1.4;margin-bottom:10px}
.card p{font-size:14px;line-height:1.6;opacity:0.95}
.stats{display:flex;gap:8px;margin-top:14px}
.stat{flex:1;background:rgba(255,255,255,0.18);border-radius:14px;padding:10px;text-align:center}
.stat b{font-size:20px;display:block}
.section{background:white;margin:14px;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.section h3{color:#0a4d26;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.mgmt-grid{display:grid;gap:12px}
.mgmt-item{border:1px solid #e0e0e0;border-radius:14px;padding:12px;display:flex;gap:12px;align-items:center;position:relative}
.mgmt-item img{width:64px;height:64px;border-radius:50%;object-fit:cover;background:#eee}
.mgmt-info{flex:1}
.mgmt-info b{display:block;font-size:15px}
.mgmt-info small{color:#666}
.mgmt-actions{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.mini{padding:6px 10px;border-radius:16px;font-size:12px;border:none;cursor:pointer;font-weight:600}
.mini.call{background:#e8f5e9;color:#0a4d26}.mini.wa{background:#25D366;color:white}.mini.edit{background:#e3f2fd;color:#1565c0}
.form input{width:100%;padding:10px;margin:6px 0;border:1px solid #ccc;border-radius:8px}
.pass-wrap{position:relative}
.pass-wrap input{padding-right:40px}
.eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;background:none;border:none;font-size:18px}
.upload-label{background:#0a4d26;color:white;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;display:inline-block;margin-top:6px}
#mgmtForm{display:none;border:2px dashed #0a4d26;padding:14px;border-radius:12px;margin-bottom:12px;background:#f9fdf9}
</style>
</head>
<body>
<div class="header">
  <h1>ദാറുസ്സലാം മദ്റസ<br>തെന്നല ആലുങ്ങൽ</h1>
</div>

<div class="subbar">
  <button class="btn btn-g">ADMIN</button>
  <button class="btn btn-b">🔗 Share</button>
  <button class="btn btn-g">💾 Save</button>
  <button class="btn btn-l">Logout</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('home')">🏠 ഹോം</button>
  <button class="tab" onclick="showTab('address')">📍 അഡ്രസ്</button>
  <button class="tab" onclick="showTab('mgmt')">👥 മാനേജ്മെന്റ്</button>
</div>

<div id="homeTab">
<div class="card">
  <h2>അസ്സലാമു അലൈക്കും വറഹ്മത്തുല്ലാഹി വബറകാതുഹു</h2>
  <p>ദാറുസ്സലാം മദ്റസ തെന്നല ആലുങ്ങലിലേക്ക് സ്വാഗതം. വിശുദ്ധ ഖുർആനിന്റെയും തിരുസുന്നത്തിന്റെയും അടിസ്ഥാനത്തിൽ പ്രവർത്തിക്കുന്ന വിദ്യാഭ്യാസ സ്ഥാപനം.</p>
  <div class="stats">
    <div class="stat"><b>4</b>മാനേജ്മെന്റ്</div>
    <div class="stat"><b>6</b>ഉസ്താദുമാർ</div>
    <div class="stat"><b>135</b>വിദ്യാർത്ഥികൾ</div>
  </div>
</div>
</div>

<div id="addressTab" class="section" style="display:none">
  <h3>📍 അഡ്രസ് വിവരങ്ങൾ <button class="mini edit" onclick="toggleAddr()">✏️ എഡിറ്റ്</button></h3>
  <div id="addrView"></div>
  <div id="addrEdit" style="display:none" class="form">
    <input id="a1" placeholder="സ്ഥാപനം"><input id="a2" placeholder="സ്ഥലം"><input id="a3" placeholder="പിൻകോഡ്"><input id="a4" placeholder="ഫോൺ"><input id="a5" placeholder="സമയം"><input id="a6" placeholder="Google Map Link">
    <button class="btn btn-g" onclick="saveAddr()">സേവ്</button> <button class="btn btn-l" onclick="toggleAddr()">റദ്ദാക്കുക</button>
  </div>
</div>

<div id="mgmtTab" class="section" style="display:none">
  <h3>👥 മാനേജ്മെന്റ് <button class="btn btn-g" style="font-size:12px;padding:6px 12px" onclick="openMgmtForm()">+ Add</button></h3>
  
  <div id="mgmtForm" class="form">
    <input id="mName" placeholder="പേര്">
    <input id="mRole" placeholder="സ്ഥാനം (ഉദാ: പ്രസിഡന്റ്)">
    <input id="mPhone" placeholder="ഫോൺ നമ്പർ (WhatsApp)">
    <div class="pass-wrap">
      <input id="mPass" type="password" placeholder="പാസ്‌വേഡ്">
      <button class="eye" onclick="togglePass()">👁️</button>
    </div>
    <input type="file" id="mPhotoFile" accept="image/*" style="display:none" onchange="previewPhoto(event)">
    <label for="mPhotoFile" class="upload-label">📸 ഫോട്ടോ അപ്‌ലോഡ് ചെയ്യുക</label>
    <img id="photoPreview" style="display:none;width:60px;height:60px;border-radius:50%;margin-left:10px;vertical-align:middle">
    <div style="margin-top:12px"><button class="btn btn-g" onclick="saveMgmt()">സേവ് ചെയ്യുക</button> <button class="btn btn-l" onclick="closeMgmtForm()">റദ്ദാക്കുക</button></div>
  </div>

  <div id="mgmtList" class="mgmt-grid"></div>
</div>

<script>
let tempPhoto='';
function showTab(t){
 document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
 document.getElementById('homeTab').style.display='none';
 document.getElementById('addressTab').style.display='none';
 document.getElementById('mgmtTab').style.display='none';
 if(t==='home'){document.getElementById('homeTab').style.display='block'; document.querySelectorAll('.tab')[0].classList.add('active')}
 if(t==='address'){document.getElementById('addressTab').style.display='block'; document.querySelectorAll('.tab')[1].classList.add('active')}
 if(t==='mgmt'){document.getElementById('mgmtTab').style.display='block'; document.querySelectorAll('.tab')[2].classList.add('active'); loadMgmt();}
}
const addrDefault={a1:"ദാറുസ്സലാം മദ്റസ",a2:"തെന്നല ആലുങ്ങൽ, മലപ്പുറം",a3:"676508",a4:"+91 9XXXXXXXXX",a5:"8 AM - 5 PM",a6:""};
function loadAddr(){const d=JSON.parse(localStorage.getItem('d_addr')||'null')||addrDefault; document.getElementById('addrView').innerHTML=`<p><b>സ്ഥാപനം:</b> ${d.a1}</p><p><b>സ്ഥലം:</b> ${d.a2}</p><p><b>പിൻകോഡ്:</b> ${d.a3}</p><p><b>ഫോൺ:</b> ${d.a4}</p><p><b>സമയം:</b> ${d.a5}</p><p><a href="${d.a6}" target="_blank">${d.a6?'Map തുറക്കുക':'Map ലിങ്ക് ഇല്ല'}</a></p>`; a1.value=d.a1;a2.value=d.a2;a3.value=d.a3;a4.value=d.a4;a5.value=d.a5;a6.value=d.a6;}
function toggleAddr(){const v=document.getElementById('addrView'),e=document.getElementById('addrEdit'); if(e.style.display==='none'){e.style.display='block';v.style.display='none'}else{e.style.display='none';v.style.display='block'}}
function saveAddr(){const d={a1:a1.value,a2:a2.value,a3:a3.value,a4:a4.value,a5:a5.value,a6:a6.value};localStorage.setItem('d_addr',JSON.stringify(d));loadAddr();toggleAddr();alert('സേവ് ചെയ്തു')}

let editIndex=-1;
function openMgmtForm(i=-1){
 document.getElementById('mgmtForm').style.display='block';
 if(i>=0){const list=JSON.parse(localStorage.getItem('d_mgmt')||'[]'); const m=list[i]; mName.value=m.name; mRole.value=m.role; mPhone.value=m.phone; mPass.value=m.pass; tempPhoto=m.photo; photoPreview.src=m.photo; photoPreview.style.display='inline-block'; editIndex=i;}
 else{mName.value='';mRole.value='';mPhone.value='';mPass.value='';tempPhoto='';photoPreview.style.display='none';editIndex=-1;}
}
function closeMgmtForm(){document.getElementById('mgmtForm').style.display='none'}
function previewPhoto(e){const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=function(ev){tempPhoto=ev.target.result; photoPreview.src=tempPhoto; photoPreview.style.display='inline-block';}; reader.readAsDataURL(file);}
function saveMgmt(){
 if(!mName.value) return alert('പേര് നൽകുക');
 let list=JSON.parse(localStorage.getItem('d_mgmt')||'[]');
 const obj={name:mName.value, role:mRole.value, phone:mPhone.value, pass:mPass.value, photo:tempPhoto||'https://via.placeholder.com/100?text=No+Photo'};
 if(editIndex>=0) list[editIndex]=obj; else list.push(obj);
 localStorage.setItem('d_mgmt',JSON.stringify(list));
 closeMgmtForm(); loadMgmt();
}
function loadMgmt(){
 const list=JSON.parse(localStorage.getItem('d_mgmt')||'[]');
 const c=document.getElementById('mgmtList');
 if(list.length===0){c.innerHTML='<p style="color:#777">ഇതുവരെ ആരും ചേർത്തിട്ടില്ല. Add ബട്ടൺ അമർത്തി ചേർക്കുക.</p>'; return;}
 c.innerHTML=list.map((m,i)=>`
  <div class="mgmt-item">
    <img src="${m.photo}">
    <div class="mgmt-info"><b>${m.name}</b><small>${m.role}</small><br><small>${m.phone}</small>
      <div class="mgmt-actions">
        <a href="tel:${m.phone}" style="text-decoration:none"><button class="mini call">📞 Call</button></a>
        <a href="https://wa.me/${m.phone.replace(/[^0-9]/g,'')}" target="_blank" style="text-decoration:none"><button class="mini wa">💬 WhatsApp</button></a>
        <button class="mini edit" onclick="openMgmtForm(${i})">✏️</button>
        <button class="mini" style="background:#ffebee;color:#c62828" onclick="delMgmt(${i})">🗑️</button>
      </div>
    </div>
  </div>`).join('');
}
function delMgmt(i){if(confirm('ഡിലീറ്റ് ചെയ്യണോ?')){let list=JSON.parse(localStorage.getItem('d_mgmt')||'[]'); list.splice(i,1); localStorage.setItem('d_mgmt',JSON.stringify(list)); loadMgmt();}}
function togglePass(){const p=document.getElementById('mPass'); p.type=p.type==='password'?'text':'password';}
loadAddr();
</script>
</body>
</html>
